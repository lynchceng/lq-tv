name: 定时执行相关脚本

permissions:
  contents: write
  pull-requests: read

on:
  schedule:
    - cron: "0 18 * * *"   # 北京时间2:00开始串行执行两个脚本
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  run-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests
      - name: 执行 KulaoFilter.py(裤佬频道过滤)
        run: |
          mkdir -p output
          python KulaoFilter.py
      - name: 执行 ParseRihou.py(日后源解密)
        run: python ParseRihou.py    
      - name: 执行 IptvCollet.py(汇总)
        run: python IptvCollet.py
      - name: 提交生成的文件
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "定时更新：TV 脚本生成文件"
          file_pattern: "output/*"
